# Importa as cores dinâmicas do Matugen
source = ~/.config/hypr/hyprlock-colors.conf

# =============================================================================
# CONFIGURAÇÕES GERAIS
# =============================================================================
general {
    no_fade_in = false
    disserter = true
}

# =============================================================================
# FUNDO (BACKGROUND) - SEM DESFOCE Pesado
# =============================================================================
background {
    monitor =
    # Tira um print e aplica um blur Quase Imperceptível (quase zero)
    path = screenshot
    color = $surface
    
    # Reduzimos o blur drasticamente
    blur_passes = 1  # Antes era 3
    blur_size = 2    # Antes era 8
    
    # Filtros para deixar a imagem de fundo mais escura e nítida
    noise = 0.0117
    contrast = 0.9000
    brightness = 0.5000 # Escurece o fundo para destacar o texto branco
    vibrancy = 0.2000
    vibrancy_darkness = 0.1
}

# =============================================================================
# O RELÓGIO EMPILHADO (Estilo Referência)
# =============================================================================
# Parte 1: As Horas (em cima)
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $primary
    
    # Usando fonte arredondada e robusta
    font_size = 140
    font_family = Inter, Poppins, sans-serif
    
    # Alinhamento centralizado
    position = 0, 180
    halign = center
    valign = center
}

# Parte 2: Os Minutos (embaixo)
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $primary
    
    # Mesma fonte e tamanho
    font_size = 140
    font_family = Inter, Poppins, sans-serif
    
    # Posicionado logo abaixo das horas
    position = 0, 10
    halign = center
    valign = center
}

# =============================================================================
# O CALENDÁRIO (SÁBADO, 19 JUL)
# =============================================================================
label {
    monitor =
    # Formato: Nome do Dia, Dia do Mês Nome do Mês (abreviado)
    text = cmd[update:1000] echo "$(date +"%A, %d %b")"
    color = $on_surface
    
    # Fonte mais fina para contraste
    font_size = 24
    font_family = Inter Thin, Poppins Light, sans-serif
    
    # Posicionado abaixo do relógio de minutos
    position = 0, -110
    halign = center
    valign = center
}

# =============================================================================
# CAIXA DE SENHA (Discreta no rodapé)
# =============================================================================
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.30
    dots_spacing = 0.15
    dots_center = true
    
    outer_color = $primary
    inner_color = rgb(25, 25, 25) # Fundo bem escuro
    font_color = $on_surface
    
    fade_on_empty = true
    placeholder_text = <i>Digite a senha...</i>
    hide_input = false
    rounding = 10
    
    # Posicionado discretamente na parte inferior
    position = 0, -250
    halign = center
    valign = center
}
